name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check runtime
        run: pnpm check:runtime

      - name: Lint
        run: pnpm lint

      - name: App lint
        run: pnpm -r run lint --if-present

      - name: OpenAPI check
        run: pnpm --filter @qhph/api run openapi:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
